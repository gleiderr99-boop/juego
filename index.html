<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operación Render - Shooter 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        
        /* Estilo para el contador de puntos */
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 28px; 
            font-weight: bold;
            text-shadow: 2px 2px 5px #000;
            z-index: 10; /* Asegura que esté por encima del juego */
        }

        /* Pantalla de inicio/instrucciones */
        #instructions { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            background: rgba(0,0,0,0.8); 
            padding: 30px; 
            border-radius: 15px;
            border: 2px solid #555;
            z-index: 20;
            cursor: pointer;
        }

        /* La mira del centro */
        #crosshair { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            width: 10px; 
            height: 10px; 
            border: 2px solid rgba(255,255,255,0.5); 
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>

    <div id="ui">
        SCORE: <span id="score">0</span>
    </div>

    <div id="instructions">
        <h1 style="color: #ff4444;">OPERACIÓN RENDER</h1>
        <p>USA <b>W, A, S, D</b> PARA MOVERTE</p>
        <p>PRESIONA <b>SHIFT</b> PARA DISPARAR</p>
        <p style="margin-top: 20px; color: #aaa;">(HAZ CLICK PARA COMENZAR)</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <script type="module" src="game.js"></script>

</body>
</html>
