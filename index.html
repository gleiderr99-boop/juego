<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Render 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* Interfaz del Velocímetro */
        #ui { 
            position: absolute; 
            bottom: 30px; 
            right: 30px; 
            color: #f1c40f; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: right;
            z-index: 10;
        }

        .speed-value {
            font-size: 60px;
            font-weight: bold;
            display: block;
            line-height: 1;
        }

        .unit {
            font-size: 20px;
            color: #fff;
        }

        /* Pantalla de inicio */
        #instructions { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            background: rgba(0,0,0,0.9); 
            padding: 40px; 
            border-radius: 20px;
            border: 3px solid #f1c40f;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
        }

        h1 { margin-top: 0; letter-spacing: 2px; }
        b { color: #f1c40f; }

        /* Punto central para orientar la cámara */
        #dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="dot"></div>

    <div id="ui">
        <span class="speed-value" id="speed">0</span>
        <span class="unit">KM/H</span>
    </div>

    <div id="instructions">
        <h1>RACING RENDER 3D</h1>
        <p><b>W / ↑</b> ACELERAR</p>
        <p><b>S / ↓</b> FRENAR / REVERSA</p>
        <p><b>A - D</b> GIRAR VOLANTE</p>
        <p style="font-size: 0.9em; color: #888; margin-top: 20px;">
            MUEVE EL MOUSE PARA ROTAR LA CÁMARA<br>
            (HAZ CLICK PARA EMPEZAR)
        </p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <script type="module" src="game.js"></script>

</body>
</html>
